version: '3.8'

services:
  # ====== 应用服务 ======
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: luckzll-app
    ports:
      - "8080:8080"
    volumes:
      - ./uploads/knowledge:/app/uploads/knowledge
    environment:
      # 覆盖数据库连接为 Docker 内部网络
      - SPRING_DATASOURCE_MYSQL_JDBC_URL=jdbc:mysql://mysql:3306/luckzll?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_MYSQL_USERNAME=root
      - SPRING_DATASOURCE_MYSQL_PASSWORD=${MYSQL_PASSWORD:-change-me}
      - SPRING_DATASOURCE_POSTGRESQL_JDBC_URL=jdbc:postgresql://postgresql:5432/luckzll
      - SPRING_DATASOURCE_POSTGRESQL_USERNAME=postgres
      - SPRING_DATASOURCE_POSTGRESQL_PASSWORD=${POSTGRES_PASSWORD:-change-me}
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - SPRING_DATA_REDIS_PASSWORD=${REDIS_PASSWORD:-change-me}
      - SPRING_RABBITMQ_HOST=rabbitmq
      - SPRING_RABBITMQ_PORT=5672
      - SPRING_RABBITMQ_USERNAME=admin
      - SPRING_RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD:-change-me}
      - JWT_SECRET=${JWT_SECRET:-change-me-before-production-use-32bytes}
      - KNOWLEDGE_UPLOAD_PATH=/app/uploads/knowledge
    depends_on:
      mysql:
        condition: service_healthy
      postgresql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - luckzll-net
    restart: unless-stopped

  # ====== MySQL ======
  mysql:
    image: mysql:8.0
    container_name: luckzll-mysql
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: "${MYSQL_PASSWORD:-change-me}"
      MYSQL_DATABASE: luckzll
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - luckzll-net
    restart: unless-stopped

  # ====== PostgreSQL（向量知识库） ======
  postgresql:
    image: postgres:alpine
    container_name: luckzll-postgresql
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-change-me}"
      POSTGRES_DB: luckzll
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - luckzll-net
    restart: unless-stopped

  # ====== Redis ======
  redis:
    image: redis:latest
    container_name: luckzll-redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-change-me}
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a '${REDIS_PASSWORD:-change-me}' ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - luckzll-net
    restart: unless-stopped

  # ====== RabbitMQ ======
  rabbitmq:
    image: rabbitmq:3-management
    container_name: luckzll-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: "${RABBITMQ_PASSWORD:-change-me}"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - luckzll-net
    restart: unless-stopped

  # ====== Nginx 反向代理 ======
  nginx:
    image: nginx:alpine
    container_name: luckzll-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx-docker.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - luckzll-net
    restart: unless-stopped

volumes:
  mysql-data:
  pg-data:
  redis-data:
  rabbitmq-data:

networks:
  luckzll-net:
    driver: bridge
