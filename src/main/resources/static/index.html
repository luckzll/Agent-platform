<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录注册</title>
    <!-- 引入 Vue 2 -->
    <script src="https://cdn.jsdelivr.net/npm/vue@2.7.14/dist/vue.min.js"></script>
    <!-- 引入 axios -->
    <script src="https://cdn.jsdelivr.net/npm/axios@1.6.0/dist/axios.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            width: 400px;
            max-width: 90%;
        }

        .tabs {
            display: flex;
            background: #f8f9fa;
        }

        .tab {
            flex: 1;
            padding: 18px;
            text-align: center;
            cursor: pointer;
            font-weight: 600;
            font-size: 16px;
            color: #6c757d;
            transition: all 0.3s ease;
            border-bottom: 3px solid transparent;
        }

        .tab:hover {
            color: #667eea;
        }

        .tab.active {
            color: #667eea;
            background: white;
            border-bottom: 3px solid #667eea;
        }

        .form-container {
            padding: 40px 30px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e9ecef;
            border-radius: 10px;
            font-size: 15px;
            transition: all 0.3s ease;
            outline: none;
        }

        .form-group input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-group input::placeholder {
            color: #adb5bd;
        }

        /* 验证码样式 */
        .captcha-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .captcha-group input {
            flex: 1;
        }

        .captcha-image {
            width: 120px;
            height: 46px;
            border-radius: 8px;
            cursor: pointer;
            border: 2px solid #e9ecef;
            object-fit: cover;
        }

        .captcha-image:hover {
            border-color: #667eea;
        }

        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .message {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            text-align: center;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .fade-enter-active, .fade-leave-active {
            transition: opacity 0.3s ease;
        }

        .fade-enter, .fade-leave-to {
            opacity: 0;
        }

        /* 加载动画 */
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #ffffff;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* 移动端适配 */
        @media (max-width: 480px) {
            body {
                padding: 15px;
            }

            .container {
                width: 100%;
                max-width: 100%;
                border-radius: 16px;
            }

            .tab {
                padding: 14px;
                font-size: 15px;
            }

            .form-container {
                padding: 25px 20px;
            }

            .form-group {
                margin-bottom: 20px;
            }

            .form-group input {
                padding: 12px 14px;
                font-size: 16px; /* 防止iOS缩放 */
            }

            .btn {
                padding: 14px;
                font-size: 15px;
            }
        }
    </style>
</head>
<body>
    <div id="app">
        <div style="position: absolute; top: 20px; left: 30px; color: white; font-size: 24px; font-weight: 700; cursor: pointer; text-shadow: 0 2px 4px rgba(0,0,0,0.2);" onclick="window.location.href='/guide/index.html'">LuckZll</div>
        <div class="container">
            <!-- 标签切换 -->
            <div class="tabs">
                <div class="tab" :class="{ active: currentTab === 'login' }" @click="switchTab('login')">
                    登录
                </div>
                <div class="tab" :class="{ active: currentTab === 'register' }" @click="switchTab('register')">
                    注册
                </div>
            </div>

            <div class="form-container">
                <!-- 消息提示 -->
                <transition name="fade">
                    <div v-if="message" class="message" :class="messageType">
                        {{ message }}
                    </div>
                </transition>

                <!-- 登录表单 -->
                <form v-if="currentTab === 'login'" @submit.prevent="handleLogin">
                    <div class="form-group">
                        <label>手机号</label>
                        <input 
                            type="tel" 
                            v-model="loginForm.userPhone" 
                            placeholder="请输入手机号"
                            maxlength="11"
                        >
                    </div>
                    <div class="form-group">
                        <label>密码</label>
                        <input 
                            type="password" 
                            v-model="loginForm.password" 
                            placeholder="请输入密码"
                        >
                    </div>
                    <div class="form-group">
                        <label>验证码</label>
                        <div class="captcha-group">
                            <input 
                                type="text" 
                                v-model="loginForm.captcha" 
                                placeholder="请输入验证码"
                                maxlength="4"
                            >
                            <img 
                                :src="captchaImage || 'data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7'" 
                                class="captcha-image" 
                                @click="refreshCaptcha"
                                title="点击刷新验证码"
                                :style="{ opacity: captchaImage ? 1 : 0.3 }"
                            >
                        </div>
                    </div>
                    <button type="submit" class="btn" :disabled="loading">
                        <span v-if="loading" class="loading"></span>
                        {{ loading ? '登录中...' : '登录' }}
                    </button>
                </form>

                <!-- 注册表单 -->
                <form v-if="currentTab === 'register'" @submit.prevent="handleRegister">
                    <div class="form-group">
                        <label>手机号</label>
                        <input 
                            type="tel" 
                            v-model="registerForm.userPhone" 
                            placeholder="请输入手机号"
                            maxlength="11"
                        >
                    </div>
                    <div class="form-group">
                        <label>用户名（选填）</label>
                        <input 
                            type="text" 
                            v-model="registerForm.userName" 
                            placeholder="请输入用户名"
                        >
                    </div>
                    <div class="form-group">
                        <label>密码</label>
                        <input 
                            type="password" 
                            v-model="registerForm.password" 
                            placeholder="请输入密码"
                        >
                    </div>
                    <div class="form-group">
                        <label>确认密码</label>
                        <input 
                            type="password" 
                            v-model="registerForm.confirmPassword" 
                            placeholder="请再次输入密码"
                        >
                    </div>
                    <div class="form-group">
                        <label>验证码</label>
                        <div class="captcha-group">
                            <input 
                                type="text" 
                                v-model="registerForm.captcha" 
                                placeholder="请输入验证码"
                                maxlength="4"
                            >
                            <img 
                                :src="captchaImage || 'data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7'" 
                                class="captcha-image" 
                                @click="refreshCaptcha"
                                title="点击刷新验证码"
                                :style="{ opacity: captchaImage ? 1 : 0.3 }"
                            >
                        </div>
                    </div>
                    <button type="submit" class="btn" :disabled="loading">
                        <span v-if="loading" class="loading"></span>
                        {{ loading ? '注册中...' : '注册' }}
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script>
        // 客户端信息请求头配置
        const CLIENT_HEADERS = {
            'X-Client-Type': 'web',
            'X-Client-Version': '1.2.0',
            'X-os-Type': 'window',
            'X-os-Version': '11',
            'X-Device-Type': 'vivo'
        };

        new Vue({
            el: '#app',
            data: {
                currentTab: 'login',
                loading: false,
                message: '',
                messageType: '',
                captchaImage: '',
                captchaKey: '',
                loginForm: {
                    userPhone: '',
                    password: '',
                    captcha: ''
                },
                registerForm: {
                    userPhone: '',
                    userName: '',
                    password: '',
                    confirmPassword: '',
                    captcha: ''
                }
            },
            created() {
                this.refreshCaptcha();
            },
            methods: {
                // 切换标签
                switchTab(tab) {
                    this.currentTab = tab;
                    this.message = '';
                    this.clearForms();
                },

                // 清空表单
                clearForms() {
                    this.loginForm = { userPhone: '', password: '', captcha: '' };
                    this.registerForm = { userPhone: '', userName: '', password: '', confirmPassword: '', captcha: '' };
                },

                // 刷新验证码
                async refreshCaptcha() {
                    try {
                        const response = await axios.get('/api/v1/captcha/generate', {
                            headers: CLIENT_HEADERS
                        });
                        console.log('验证码响应:', response.data);
                        if (response.data.code === 200) {
                            this.captchaImage = response.data.data.captchaImage;
                            this.captchaKey = response.data.data.captchaKey;
                            console.log('验证码图片已设置:', this.captchaImage ? '有数据' : '无数据');
                        } else {
                            console.error('获取验证码失败:', response.data.msg);
                        }
                    } catch (error) {
                        console.error('获取验证码失败:', error);
                    }
                },

                // 显示消息
                showMessage(msg, type) {
                    this.message = msg;
                    this.messageType = type;
                    // 3秒后自动隐藏
                    setTimeout(() => {
                        this.message = '';
                    }, 3000);
                },

                // 验证手机号格式
                validatePhone(phone) {
                    return /^1[3-9]\d{9}$/.test(phone);
                },

                // 处理登录
                async handleLogin() {
                    // 表单验证
                    if (!this.loginForm.userPhone) {
                        this.showMessage('请输入手机号', 'error');
                        return;
                    }
                    if (!this.validatePhone(this.loginForm.userPhone)) {
                        this.showMessage('手机号格式不正确', 'error');
                        return;
                    }
                    if (!this.loginForm.password) {
                        this.showMessage('请输入密码', 'error');
                        return;
                    }
                    if (!this.loginForm.captcha) {
                        this.showMessage('请输入验证码', 'error');
                        return;
                    }

                    this.loading = true;
                    try {
                        const response = await axios.post('/api/v1/auth/login', {
                            userPhone: this.loginForm.userPhone,
                            password: this.loginForm.password,
                            captcha: this.loginForm.captcha,
                            captchaKey: this.captchaKey
                        }, {
                            headers: CLIENT_HEADERS
                        });

                        if (response.data.code === 200) {
                            this.showMessage('登录成功！', 'success');
                            // 保存 Token
                            if (response.data.data && response.data.data.token) {
                                localStorage.setItem('token', response.data.data.token);
                            }
                            // 保存用户信息
                            if (response.data.data && response.data.data.user) {
                                localStorage.setItem('userInfo', JSON.stringify(response.data.data.user));
                            }
                            // 跳转到首页
                            setTimeout(() => {
                                window.location.href = '/home.html';
                            }, 1000);
                        } else {
                            this.showMessage(response.data.msg || '登录失败', 'error');
                        }
                    } catch (error) {
                        console.error('登录请求失败:', error);
                        this.showMessage(error.response?.data?.msg || '网络错误，请稍后重试', 'error');
                        // 刷新验证码
                        this.refreshCaptcha();
                        this.loginForm.captcha = '';
                    } finally {
                        this.loading = false;
                    }
                },

                // 处理注册
                async handleRegister() {
                    // 表单验证
                    if (!this.registerForm.userPhone) {
                        this.showMessage('请输入手机号', 'error');
                        return;
                    }
                    if (!this.validatePhone(this.registerForm.userPhone)) {
                        this.showMessage('手机号格式不正确', 'error');
                        return;
                    }
                    if (!this.registerForm.password) {
                        this.showMessage('请输入密码', 'error');
                        return;
                    }
                    if (this.registerForm.password.length < 6) {
                        this.showMessage('密码长度不能少于6位', 'error');
                        return;
                    }
                    if (this.registerForm.password !== this.registerForm.confirmPassword) {
                        this.showMessage('两次输入的密码不一致', 'error');
                        return;
                    }
                    if (!this.registerForm.captcha) {
                        this.showMessage('请输入验证码', 'error');
                        return;
                    }

                    this.loading = true;
                    try {
                        const response = await axios.post('/api/v1/auth/register', {
                            userPhone: this.registerForm.userPhone,
                            userName: this.registerForm.userName || null,
                            password: this.registerForm.password,
                            captcha: this.registerForm.captcha,
                            captchaKey: this.captchaKey
                        }, {
                            headers: CLIENT_HEADERS
                        });

                        if (response.data.code === 200) {
                            this.showMessage('注册成功！请登录', 'success');
                            // 注册成功后切换到登录标签
                            setTimeout(() => {
                                this.switchTab('login');
                                this.loginForm.userPhone = this.registerForm.userPhone;
                            }, 1500);
                        } else {
                            this.showMessage(response.data.msg || '注册失败', 'error');
                        }
                    } catch (error) {
                        console.error('注册请求失败:', error);
                        this.showMessage(error.response?.data?.msg || '网络错误，请稍后重试', 'error');
                        // 刷新验证码
                        this.refreshCaptcha();
                        this.registerForm.captcha = '';
                    } finally {
                        this.loading = false;
                    }
                }
            }
        });
    </script>
</body>
</html>
